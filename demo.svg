<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
<style>
@keyframes gateAnim{0%,4%{opacity:0}10%{opacity:1}48%{opacity:1}56%,100%{opacity:0}}
@keyframes modalAnim{0%,52%{opacity:0;transform:translateY(16px)}60%{opacity:1;transform:translateY(0)}95%{opacity:1}100%{opacity:0}}
.gate{animation:gateAnim 9s ease infinite}
.modal{animation:modalAnim 9s ease infinite}
</style>

<rect width="520" height="300" rx="12" fill="#0d1117"/>
<text x="260" y="28" fill="#52B788" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.8">react-premium-gate</text>
<text x="260" y="44" fill="#3a5a3a" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">Razorpay paywall components for Indian SaaS</text>

<!-- PremiumGate component -->
<g class="gate">
  <rect x="110" y="58" width="300" height="210" rx="12" fill="#111820" stroke="#21262d" stroke-width="1"/>
  <rect x="185" y="82" width="150" height="52" rx="8" fill="#1a1500"/>
  <text x="260" y="119" fill="#F0B429" font-family="system-ui,-apple-system,sans-serif" font-size="30" text-anchor="middle">👑</text>
  <text x="260" y="158" fill="#e6edf3" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Analytics — Pro Only</text>
  <text x="260" y="177" fill="#6e7681" font-family="system-ui,-apple-system,sans-serif" font-size="11.5" text-anchor="middle">Unlock detailed charts and AI insights.</text>
  <rect x="155" y="195" width="210" height="40" rx="8" fill="#F0B429"/>
  <text x="260" y="220" fill="#0d1117" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Upgrade to Pro →</text>
  <text x="260" y="254" fill="#3a5a3a" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">🔒 Secure · Cancel anytime</text>
</g>

<!-- PricingModal -->
<g class="modal">
  <rect x="55" y="52" width="410" height="238" rx="12" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <text x="260" y="90" fill="#e6edf3" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" text-anchor="middle">👑  Upgrade to Pro</text>
  <text x="260" y="108" fill="#6e7681" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">Less than a coffee. Way more value.</text>
  <!-- Toggle -->
  <rect x="130" y="120" width="260" height="34" rx="8" fill="#1c2128"/>
  <rect x="264" y="122" width="124" height="30" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="195" y="142" fill="#6e7681" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">Monthly</text>
  <text x="295" y="140" fill="#F0B429" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Yearly</text>
  <rect x="338" y="124" width="44" height="16" rx="4" fill="#2a1f00"/>
  <text x="360" y="136" fill="#F0B429" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" text-anchor="middle">SAVE 37%</text>
  <!-- Price -->
  <text x="260" y="198" fill="#e6edf3" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="700" text-anchor="middle">₹2,999</text>
  <text x="260" y="216" fill="#6e7681" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">per year · billed annually</text>
  <!-- CTA -->
  <rect x="115" y="228" width="290" height="42" rx="8" fill="#F0B429"/>
  <text x="260" y="254" fill="#0d1117" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Get Pro →</text>
  <text x="260" y="280" fill="#3a5a3a" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">🔒 Secure payment via Razorpay · Cancel anytime</text>
</g>
</svg>
